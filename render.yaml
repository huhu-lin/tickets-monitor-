services:
  - type: web
    name: tickets-monitor
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: "10000"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CHECK_INTERVAL
        value: "60"
      # TARGET_URL / EVENT_NAME / WATCH_ZONES intentionally omitted so the
      # service boots into standby; configure them at runtime via Telegram:
      #   /seturl 網址
      #   /setevent 場次名稱
      #   /setzones 關鍵字
